map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

upstream django_backend {
  server backend:8000;
}

upstream web_backend {
  server web:8080;
}

upstream cryptpad_backend {
  server cryptpad:3000;
}

upstream cryptpad_websocket_backend {
  server cryptpad:3003;
}

upstream peertube_backend {
  server peertube:9000;
}

upstream scholarsome_backend {
  server scholarsome:3000;
}

upstream h5p_backend {
  server h5p:8080;
}

upstream code_backend {
  server code-server:8443;
}

upstream librechat_backend {
  server librechat:3080;
}

upstream ralph_backend {
  server ralph:8100;
}

upstream xapi_ingest_backend {
  server xapi-ingest:8090;
}

proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=static_cache:10m max_size=128m inactive=1h use_temp_path=off;

server {
  listen 80;
  server_name olt.localhost auth.localhost;

  location = /.well-known/openid-configuration {
    proxy_pass http://django_backend/o/.well-known/openid-configuration;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }

  location ~ ^/(api|admin|accounts|_allauth|o|static|media)/ {
    proxy_pass http://django_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location / {
    proxy_pass http://web_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}

server {
  listen 80;
  server_name cryptpad.localhost;
  client_max_body_size 256m;

  location = / {
    return 302 /register/?olt_auto_sso=1;
  }

  location = /oauth2/auth {
    internal;
    proxy_pass http://oauth2-proxy-cryptpad:4180/oauth2/auth;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Scheme $scheme;
    proxy_set_header Host $host;
  }

  location /oauth2/ {
    proxy_pass http://oauth2-proxy-cryptpad:4180;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /ingest/ {
    rewrite ^/ingest/(.*)$ /$1 break;
    proxy_pass http://xapi_ingest_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location @oauth2_sign_in {
    return 302 /oauth2/start?rd=$scheme://$host$request_uri;
  }

  location ^~ /common/ {
    proxy_pass http://cryptpad_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /components/ {
    proxy_pass http://cryptpad_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /customize/ {
    proxy_pass http://cryptpad_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /customize.dist/ {
    proxy_pass http://cryptpad_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /lib/ {
    proxy_pass http://cryptpad_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /sso/ {
    proxy_pass http://cryptpad_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ~ ^/(calendar|checkup|code|contacts|diagram|doc|drive|file|form|kanban|login|notifications|pad|poll|presentation|profile|register|settings|sheet|slide|support|teams|whiteboard)/.+\.(js|css|html|less|map|json)$ {
    proxy_pass http://cryptpad_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /extensions.js {
    proxy_pass http://cryptpad_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /favicon.ico {
    proxy_pass http://cryptpad_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /api/broadcast {
    proxy_pass http://cryptpad_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /api/config {
    proxy_pass http://cryptpad_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /api/instance {
    proxy_pass http://cryptpad_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /cryptpad_websocket {
    auth_request /oauth2/auth;
    error_page 401 = @oauth2_sign_in;
    auth_request_set $user $upstream_http_x_auth_request_user;
    auth_request_set $email $upstream_http_x_auth_request_email;
    auth_request_set $access_token $upstream_http_x_auth_request_access_token;

    proxy_pass http://cryptpad_websocket_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-User $user;
    proxy_set_header X-Forwarded-Email $email;
    proxy_set_header X-Forwarded-Access-Token $access_token;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }

  location / {
    auth_request /oauth2/auth;
    error_page 401 = @oauth2_sign_in;
    auth_request_set $user $upstream_http_x_auth_request_user;
    auth_request_set $email $upstream_http_x_auth_request_email;
    auth_request_set $access_token $upstream_http_x_auth_request_access_token;

    proxy_pass http://cryptpad_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-User $user;
    proxy_set_header X-Forwarded-Email $email;
    proxy_set_header X-Forwarded-Access-Token $access_token;
    proxy_set_header Accept-Encoding "";
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    sub_filter_once on;
    sub_filter '</head>' '<script src="/customize/olt-xapi-config.js"></script><script src="/customize/olt-xapi.js"></script></head>';
  }
}

