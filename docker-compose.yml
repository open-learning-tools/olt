name: olt

services:
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - web
      - cryptpad
      - peertube-bootstrap
      - peertube
      - scholarsome
      - h5p
      - code-server
      - librechat
      - ralph
      - oauth2-proxy-cryptpad
      - oauth2-proxy-scholarsome
      - oauth2-proxy-code
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      olt_network:
        aliases:
          - olt.localhost
          - auth.localhost
          - cryptpad.localhost
          - cryptpad-sandbox.localhost
          - peertube.localhost
          - scholarsome.localhost
          - h5p.localhost
          - code.localhost
          - chat.localhost
          - lrs.localhost

  backend:
    build:
      context: .
      dockerfile: ./docker/api/Dockerfile
    environment:
      DJANGO_DEBUG: "${DJANGO_DEBUG:-1}"
      DJANGO_SECRET_KEY: "${DJANGO_SECRET_KEY}"
      ALLOWED_HOSTS: "${ALLOWED_HOSTS:-olt.localhost,auth.localhost,backend,localhost,127.0.0.1}"
      DATABASE_URL: "postgres://${DJANGO_DB_USER}:${DJANGO_DB_PASSWORD}@postgres:5432/${DJANGO_DB_NAME}"
      REDIS_URL: "redis://redis:6379/0"
      RESEND_API_KEY: "${RESEND_API_KEY:-local-dev-unused}"
      HEADLESS_JWT_PRIVATE_KEY_FILE: "${HEADLESS_JWT_PRIVATE_KEY_FILE:-/run/secrets/olt_oidc_private_key}"
      OIDC_ISSUER_URL: "${OIDC_ISSUER_URL:-http://olt.localhost}"
      OIDC_JWKS_URL: "${OIDC_JWKS_URL:-http://olt.localhost/o/.well-known/jwks.json}"
      OIDC_RSA_PRIVATE_KEY_FILE: "${OIDC_RSA_PRIVATE_KEY_FILE:-/run/secrets/olt_oidc_private_key}"
      DJANGO_SUPERUSER_USERNAME: "${DJANGO_SUPERUSER_USERNAME}"
      DJANGO_SUPERUSER_EMAIL: "${DJANGO_SUPERUSER_EMAIL}"
      DJANGO_SUPERUSER_PASSWORD: "${DJANGO_SUPERUSER_PASSWORD}"
      PEERTUBE_OIDC_CLIENT_ID: "${PEERTUBE_OIDC_CLIENT_ID}"
      PEERTUBE_OIDC_CLIENT_SECRET: "${PEERTUBE_OIDC_CLIENT_SECRET}"
      LIBRECHAT_OIDC_CLIENT_ID: "${LIBRECHAT_OIDC_CLIENT_ID}"
      LIBRECHAT_OIDC_CLIENT_SECRET: "${LIBRECHAT_OIDC_CLIENT_SECRET}"
      CRYPTPAD_OAUTH_CLIENT_ID: "${CRYPTPAD_OAUTH_CLIENT_ID}"
      CRYPTPAD_OAUTH_CLIENT_SECRET: "${CRYPTPAD_OAUTH_CLIENT_SECRET}"
      SCHOLARSOME_OAUTH_CLIENT_ID: "${SCHOLARSOME_OAUTH_CLIENT_ID}"
      SCHOLARSOME_OAUTH_CLIENT_SECRET: "${SCHOLARSOME_OAUTH_CLIENT_SECRET}"
      CODE_OAUTH_CLIENT_ID: "${CODE_OAUTH_CLIENT_ID}"
      CODE_OAUTH_CLIENT_SECRET: "${CODE_OAUTH_CLIENT_SECRET}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./secrets/oidc.key:/run/secrets/olt_oidc_private_key:ro
    expose:
      - "8000"
    networks:
      - olt_network

  web:
    image: node:22-alpine
    working_dir: /app
    command:
      [
        "sh",
        "-c",
        "corepack enable && pnpm install --frozen-lockfile --store-dir /tmp/pnpm-store && pnpm --filter open-learning-tools-web exec vite --host 0.0.0.0 --port 8080",
      ]
    environment:
      CI: "true"
      VITE_API_BASE_URL: "http://olt.localhost"
    volumes:
      - ./:/app
      - web_node_modules:/app/node_modules
    expose:
      - "8080"
    networks:
      - olt_network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-olt}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB:-olt}"
      POSTGRES_MULTIPLE_DATABASES: "${POSTGRES_MULTIPLE_DATABASES:-olt_django,olt_peertube}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-olt} -d ${POSTGRES_DB:-olt}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - olt_network

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - olt_network

  maildev:
    image: maildev/maildev:2.2.1
    environment:
      MAILDEV_WEB_PORT: "1080"
      MAILDEV_SMTP_PORT: "1025"
    expose:
      - "1025"
      - "1080"
    networks:
      - olt_network

  cryptpad:
    image: cryptpad/cryptpad:version-2024.12.0
    command:
      [
        "sh",
        "-c",
        "node /cryptpad/olt-patch-auto-sso.js && npm start",
      ]
    environment:
      CPAD_MAIN_DOMAIN: "http://cryptpad.localhost"
      CPAD_SANDBOX_DOMAIN: "http://cryptpad-sandbox.localhost"
      CPAD_CONF: "/cryptpad/config/config.js"
      CRYPTPAD_OIDC_ISSUER: "${OIDC_ISSUER_URL:-http://olt.localhost}"
      CRYPTPAD_OAUTH_CLIENT_ID: "${CRYPTPAD_OAUTH_CLIENT_ID}"
      CRYPTPAD_OAUTH_CLIENT_SECRET: "${CRYPTPAD_OAUTH_CLIENT_SECRET}"
    volumes:
      - cryptpad_blob:/cryptpad/blob
      - cryptpad_block:/cryptpad/block
      - ./docker/cryptpad/config/config.js:/cryptpad/config/config.js:ro
      - ./docker/cryptpad/config/sso.js:/cryptpad/config/sso.js:ro
      - ./docker/cryptpad/plugins/sso:/cryptpad/lib/plugins/sso:ro
      - ./docker/cryptpad/patch-auto-sso.js:/cryptpad/olt-patch-auto-sso.js:ro
      - ./docker/cryptpad/customize:/cryptpad/customize
      - cryptpad_data:/cryptpad/data
      - cryptpad_datastore:/cryptpad/datastore
    expose:
      - "3000"
      - "3003"
    networks:
      - olt_network

  oauth2-proxy-cryptpad:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.9.0
    command:
      - --http-address=0.0.0.0:4180
      - --provider=oidc
      - --code-challenge-method=S256
      - --skip-oidc-discovery=true
      - --oidc-issuer-url=${OIDC_ISSUER_URL:-http://olt.localhost}
      - --login-url=${OIDC_AUTHORIZE_URL:-http://olt.localhost/o/authorize/}
      - --redeem-url=${OIDC_TOKEN_URL:-http://olt.localhost/o/token/}
      - --oidc-jwks-url=${OIDC_JWKS_URL:-http://olt.localhost/o/.well-known/jwks.json}
      - --redirect-url=http://cryptpad.localhost/oauth2/callback
      - --whitelist-domain=cryptpad.localhost
      - --client-id=${CRYPTPAD_OAUTH_CLIENT_ID}
      - --client-secret=${CRYPTPAD_OAUTH_CLIENT_SECRET}
      - --cookie-secret=${CRYPTPAD_OAUTH_COOKIE_SECRET}
      - --cookie-secure=false
      - --email-domain=*
      - --scope=openid profile email
      - --reverse-proxy=true
      - --set-xauthrequest=true
      - --pass-access-token=true
      - --pass-user-headers=true
      - --skip-provider-button=true
      - --upstream=static://202
    expose:
      - "4180"
    networks:
      - olt_network

  peertube:
    image: chocobozzz/peertube:production-bookworm
    depends_on:
      peertube-bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PEERTUBE_WEBSERVER_HOSTNAME: "peertube.localhost"
      PEERTUBE_WEBSERVER_PORT: "80"
      PEERTUBE_WEBSERVER_HTTPS: "false"
      PEERTUBE_DB_HOSTNAME: "postgres"
      PEERTUBE_DB_PORT: "5432"
      PEERTUBE_DB_USERNAME: "${PEERTUBE_DB_USER:-olt}"
      PEERTUBE_DB_PASSWORD: "${PEERTUBE_DB_PASSWORD:-${POSTGRES_PASSWORD}}"
      PEERTUBE_DB_NAME: "${PEERTUBE_DB_NAME:-olt_peertube}"
      PEERTUBE_REDIS_HOSTNAME: "redis"
      PEERTUBE_REDIS_PORT: "6379"
      PEERTUBE_SECRET: "${PEERTUBE_SECRET}"
      PEERTUBE_ADMIN_EMAIL: "${PEERTUBE_ADMIN_EMAIL:-admin@olt.localhost}"
      PEERTUBE_SMTP_HOSTNAME: "${SMTP_HOSTNAME:-maildev}"
      PEERTUBE_SMTP_PORT: "${SMTP_PORT:-1025}"
      PEERTUBE_SMTP_DISABLE_STARTTLS: "true"
      PEERTUBE_SMTP_FROM: "${PEERTUBE_SMTP_FROM:-noreply@olt.localhost}"
      PEERTUBE_REDIRECT_ON_SINGLE_EXTERNAL_AUTH: "true"
    volumes:
      - peertube_assets:/app/client/dist
      - peertube_data:/data
      - ./docker/peertube/config:/config:ro
    expose:
      - "9000"
    networks:
      - olt_network

  peertube-bootstrap:
    image: node:22-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PEERTUBE_DATABASE_URL: "postgres://${PEERTUBE_DB_USER:-olt}:${PEERTUBE_DB_PASSWORD:-${POSTGRES_PASSWORD}}@postgres:5432/${PEERTUBE_DB_NAME:-olt_peertube}"
      PEERTUBE_OIDC_PLUGIN_VERSION: "${PEERTUBE_OIDC_PLUGIN_VERSION:-1.1.0}"
      PEERTUBE_OIDC_DISCOVER_URL: "${OIDC_ISSUER_URL:-http://olt.localhost}"
      PEERTUBE_OIDC_CLIENT_ID: "${PEERTUBE_OIDC_CLIENT_ID}"
      PEERTUBE_OIDC_CLIENT_SECRET: "${PEERTUBE_OIDC_CLIENT_SECRET}"
      PEERTUBE_OIDC_SCOPE: "${PEERTUBE_OIDC_SCOPE:-openid email profile}"
    command: ["sh", "/bootstrap/bootstrap-plugin.sh"]
    volumes:
      - peertube_data:/data
      - ./docker/peertube/bootstrap-plugin.sh:/bootstrap/bootstrap-plugin.sh:ro
    networks:
      - olt_network

  scholarsome:
    image: hwgilbert16/scholarsome:latest
    platform: linux/amd64
    command:
      - sh
      - -lc
      - |
        node -e 'const fs = require("fs"); for (const file of ["dist/apps/api/main.js", "apps/api/src/app/app.module.ts"]) { if (!fs.existsSync(file)) continue; const text = fs.readFileSync(file, "utf8"); fs.writeFileSync(file, text.replace(/defaultOptions:/g, "commonOptions:")); }'
        exec npm run serve:node
    depends_on:
      scholarsome-db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: "development"
      DATABASE_URL: "mysql://scholarsome:${SCHOLARSOME_DB_PASSWORD}@scholarsome-db:3306/scholarsome"
      JWT_SECRET: "${SCHOLARSOME_JWT_SECRET}"
      HTTP_PORT: "3000"
      STORAGE_TYPE: "local"
      STORAGE_LOCAL_DIR: "/data"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_USERNAME: ""
      REDIS_PASSWORD: ""
      HOST: "http://scholarsome.localhost"
      SMTP_HOST: "${SMTP_HOSTNAME:-maildev}"
      SMTP_PORT: "${SMTP_PORT:-1025}"
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
      S3_STORAGE_ENDPOINT: ""
      S3_STORAGE_ACCESS_KEY: ""
      S3_STORAGE_SECRET_KEY: ""
      S3_STORAGE_REGION: ""
      S3_STORAGE_BUCKET: ""
      SCHOLARSOME_RECAPTCHA_SITE: ""
      SCHOLARSOME_RECAPTCHA_SECRET: ""
    expose:
      - "3000"
    volumes:
      - scholarsome_data:/data
    networks:
      - olt_network

  scholarsome-db:
    image: mariadb:11
    environment:
      MARIADB_RANDOM_ROOT_PASSWORD: "yes"
      MARIADB_ROOT_HOST: "localhost"
      MARIADB_DATABASE: "scholarsome"
      MARIADB_USER: "scholarsome"
      MARIADB_PASSWORD: "${SCHOLARSOME_DB_PASSWORD}"
    volumes:
      - scholarsome_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u scholarsome -p$${MARIADB_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - olt_network

  h5p:
    build:
      context: ./docker/h5p
    environment:
      NODE_ENV: "development"
      PORT: "8080"
    volumes:
      - ./docker/h5p/content:/app/content
    expose:
      - "8080"
    networks:
      - olt_network

  code-server:
    image: lscr.io/linuxserver/code-server:latest
    environment:
      PUID: "${PUID:-1000}"
      PGID: "${PGID:-1000}"
      TZ: "${TZ:-America/New_York}"
      SUDO_PASSWORD: "${CODE_SERVER_SUDO_PASSWORD:-dev-password}"
      PROXY_DOMAIN: "code.localhost"
    volumes:
      - code_server_config:/config
      - ./docker/code-server/config.yaml:/config/.config/code-server/config.yaml:ro
      - ./docker/code-server/workspace/olt.code-workspace:/config/workspace/olt.code-workspace:ro
      - ./:/workspace/olt
    expose:
      - "8443"
    networks:
      - olt_network

  librechat:
    image: ghcr.io/danny-avila/librechat-dev:latest
    env_file:
      - path: "${LIBRECHAT_PROVIDER_ENV_FILE:-./.librechat-provider.env}"
        required: false
    command:
      - sh
      - -lc
      - |
        node -e 'const fs = require("fs"); const file = "api/strategies/openidStrategy.js"; const text = fs.readFileSync(file, "utf8"); fs.writeFileSync(file, text.replace("[client.customFetch]: customFetch,\n      },", "[client.customFetch]: customFetch,\n        execute: [client.allowInsecureRequests],\n      },"));'
        exec npm run backend
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
    environment:
      HOST: "0.0.0.0"
      PORT: "3080"
      DOMAIN_CLIENT: "http://chat.localhost"
      DOMAIN_SERVER: "http://chat.localhost"
      ENDPOINTS: "${LIBRECHAT_ENDPOINTS:-openAI,agents}"
      MONGO_URI: "mongodb://mongodb:27017/${LIBRECHAT_MONGO_DB:-LibreChat}"
      REDIS_URI: "redis://redis:6379/1"
      JWT_SECRET: "${LIBRECHAT_JWT_SECRET}"
      JWT_REFRESH_SECRET: "${LIBRECHAT_JWT_REFRESH_SECRET}"
      CREDS_KEY: "${LIBRECHAT_CREDS_KEY}"
      CREDS_IV: "${LIBRECHAT_CREDS_IV}"
      ALLOW_SOCIAL_LOGIN: "${LIBRECHAT_ALLOW_SOCIAL_LOGIN:-true}"
      ALLOW_EMAIL_LOGIN: "${LIBRECHAT_ALLOW_EMAIL_LOGIN:-false}"
      ALLOW_REGISTRATION: "${LIBRECHAT_ALLOW_REGISTRATION:-false}"
      OPENID_CLIENT_ID: "${LIBRECHAT_OIDC_CLIENT_ID}"
      OPENID_CLIENT_SECRET: "${LIBRECHAT_OIDC_CLIENT_SECRET}"
      OPENID_ISSUER: "${OIDC_ISSUER_URL:-http://olt.localhost}"
      OPENID_SESSION_SECRET: "${LIBRECHAT_OPENID_SESSION_SECRET}"
      OPENID_CALLBACK_URL: "${LIBRECHAT_OIDC_CALLBACK_PATH:-/oauth/openid/callback}"
      OPENID_SCOPE: "${LIBRECHAT_OIDC_SCOPE:-openid profile email}"
    volumes:
      - ./docker/librechat/librechat.yaml:/app/librechat.yaml:ro
      - librechat_images:/app/client/public/images
      - librechat_uploads:/app/uploads
      - librechat_logs:/app/api/logs
    expose:
      - "3080"
    networks:
      - olt_network

  mongodb:
    image: mongo:7
    volumes:
      - mongodb_data:/data/db
    networks:
      - olt_network

  ralph:
    image: fundocker/ralph:latest
    user: "0:0"
    command:
      - sh
      - -c
      - |
        if [ ! -s /app/.ralph/auth.json ]; then
          ralph auth \
            --write-to-disk \
            --username "$$RALPH_LRS_USERNAME" \
            --password "$$RALPH_LRS_PASSWORD" \
            --scope statements/write \
            --scope statements/read \
            --agent-ifi-mbox "mailto:$$RALPH_LRS_EMAIL";
        fi
        exec uvicorn ralph.api:app --proxy-headers --workers 1 --host 0.0.0.0 --port 8100
    depends_on:
      mongodb:
        condition: service_started
    environment:
      RALPH_APP_DIR: "/app/.ralph"
      RALPH_RUNSERVER_BACKEND: "mongo"
      RALPH_RUNSERVER_AUTH_BACKENDS: "basic"
      RALPH_RUNSERVER_HOST: "0.0.0.0"
      RALPH_RUNSERVER_PORT: "8100"
      RALPH_BACKENDS__LRS__MONGO__CONNECTION_URI: "mongodb://mongodb:27017/${RALPH_MONGO_DB:-ralph}"
      RALPH_AUTH_FILE: "/app/.ralph/auth.json"
      RALPH_LRS_USERNAME: "${RALPH_LRS_USERNAME:-admin}"
      RALPH_LRS_PASSWORD: "${RALPH_LRS_PASSWORD}"
      RALPH_LRS_EMAIL: "${RALPH_LRS_EMAIL:-admin@example.com}"
    volumes:
      - ralph_data:/app/.ralph
    expose:
      - "8100"
    networks:
      - olt_network

  oauth2-proxy-scholarsome:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.9.0
    command:
      - --http-address=0.0.0.0:4180
      - --provider=oidc
      - --code-challenge-method=S256
      - --skip-oidc-discovery=true
      - --oidc-issuer-url=${OIDC_ISSUER_URL:-http://olt.localhost}
      - --login-url=${OIDC_AUTHORIZE_URL:-http://olt.localhost/o/authorize/}
      - --redeem-url=${OIDC_TOKEN_URL:-http://olt.localhost/o/token/}
      - --oidc-jwks-url=${OIDC_JWKS_URL:-http://olt.localhost/o/.well-known/jwks.json}
      - --redirect-url=http://scholarsome.localhost/oauth2/callback
      - --whitelist-domain=scholarsome.localhost
      - --client-id=${SCHOLARSOME_OAUTH_CLIENT_ID}
      - --client-secret=${SCHOLARSOME_OAUTH_CLIENT_SECRET}
      - --cookie-secret=${SCHOLARSOME_OAUTH_COOKIE_SECRET}
      - --cookie-secure=false
      - --email-domain=*
      - --scope=openid profile email
      - --reverse-proxy=true
      - --set-xauthrequest=true
      - --pass-access-token=true
      - --pass-user-headers=true
      - --skip-provider-button=true
      - --upstream=static://202
    expose:
      - "4180"
    networks:
      - olt_network

  oauth2-proxy-code:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.9.0
    command:
      - --http-address=0.0.0.0:4180
      - --provider=oidc
      - --code-challenge-method=S256
      - --skip-oidc-discovery=true
      - --oidc-issuer-url=${OIDC_ISSUER_URL:-http://olt.localhost}
      - --login-url=${OIDC_AUTHORIZE_URL:-http://olt.localhost/o/authorize/}
      - --redeem-url=${OIDC_TOKEN_URL:-http://olt.localhost/o/token/}
      - --oidc-jwks-url=${OIDC_JWKS_URL:-http://olt.localhost/o/.well-known/jwks.json}
      - --redirect-url=http://code.localhost/oauth2/callback
      - --whitelist-domain=code.localhost
      - --client-id=${CODE_OAUTH_CLIENT_ID}
      - --client-secret=${CODE_OAUTH_CLIENT_SECRET}
      - --cookie-secret=${CODE_OAUTH_COOKIE_SECRET}
      - --cookie-secure=false
      - --email-domain=*
      - --scope=openid profile email
      - --reverse-proxy=true
      - --set-xauthrequest=true
      - --pass-access-token=true
      - --pass-user-headers=true
      - --skip-provider-button=true
      - --upstream=static://202
    expose:
      - "4180"
    networks:
      - olt_network

networks:
  olt_network:
    name: olt_network
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  cryptpad_blob:
  cryptpad_block:
  cryptpad_data:
  cryptpad_datastore:
  peertube_assets:
  peertube_data:
  code_server_config:
  mongodb_data:
  librechat_images:
  librechat_uploads:
  librechat_logs:
  ralph_data:
  scholarsome_data:
  scholarsome_db_data:
  web_node_modules:
