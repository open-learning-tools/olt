server {
  listen 80;
  server_name scholarsome.localhost;

  location = /oauth2/auth {
    internal;
    proxy_pass http://oauth2-proxy-scholarsome:4180/oauth2/auth;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Scheme $scheme;
    proxy_set_header Host $host;
  }

  location /oauth2/ {
    proxy_pass http://oauth2-proxy-scholarsome:4180;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location @oauth2_sign_in {
    return 302 /oauth2/start?rd=$scheme://$host$request_uri;
  }

  location = /olt-xapi-forwarder.js {
    auth_request /oauth2/auth;
    error_page 401 = @oauth2_sign_in;
    alias /usr/share/nginx/olt/scholarsome/olt-xapi-forwarder.js;
    default_type application/javascript;
  }

  location / {
    auth_request /oauth2/auth;
    error_page 401 = @oauth2_sign_in;
    auth_request_set $user $upstream_http_x_auth_request_user;
    auth_request_set $email $upstream_http_x_auth_request_email;
    auth_request_set $access_token $upstream_http_x_auth_request_access_token;

    proxy_pass http://scholarsome_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-User $user;
    proxy_set_header X-Forwarded-Email $email;
    proxy_set_header X-Forwarded-Access-Token $access_token;
    proxy_set_header Accept-Encoding "";
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    sub_filter_once on;
    sub_filter '</head>' '<script>window.OLT_SCHOLARSOME_XAPI={ingestUrl:"http://lrs.localhost/ingest/xapi/statements",activityPrefix:"http://olt.localhost/xapi/activities"};</script><script src="/olt-xapi-forwarder.js" defer></script></head>';
  }
}

