<?xml version="1.0" encoding="UTF-8"?>
<!--
SPDX-FileCopyrightText: 2026 Open Learning Tools
SPDX-License-Identifier: AGPL-3.0-or-later

OLT-branded replacement for CryptPad_logo_grey.svg. Uses a gentle grayscale
filter so the wordmark blends with neutral background surfaces (404 page,
loading transitions, secondary chrome).
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1254 515"
     preserveAspectRatio="xMidYMid meet"
     role="img" aria-label="Open Learning Tools">
  <title>Open Learning Tools</title>
  <defs>
    <filter id="olt-grey">
      <feColorMatrix type="matrix"
        values="0.2126 0.7152 0.0722 0 0
                0.2126 0.7152 0.0722 0 0
                0.2126 0.7152 0.0722 0 0
                0      0      0      0.85 0" />
    </filter>
  </defs>
  <image href="/customize/olt-logo.png"
         xlink:href="/customize/olt-logo.png"
         x="0" y="0" width="1254" height="515"
         filter="url(#olt-grey)" />
</svg>
