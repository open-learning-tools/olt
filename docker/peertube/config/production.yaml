# Minimal OLT local-dev PeerTube configuration.
# Mount this directory at /config in the PeerTube container.

listen:
  hostname: '0.0.0.0'
  port: 9000

webserver:
  hostname: 'peertube.localhost'
  port: 80
  https: false

trust_proxy:
  - 'loopback'
  - 'linklocal'
  - 'uniquelocal'
  - '172.16.0.0/12'

secrets:
  peertube: null

database:
  hostname: 'postgres'
  port: 5432
  ssl: false
  name: 'olt_peertube'
  suffix: ''
  username: 'olt'
  password: null

redis:
  hostname: 'redis'
  port: 6379
  auth: null

smtp:
  hostname: 'maildev'
  port: 1025
  username: null
  password: null
  tls: false
  disable_starttls: true
  from_address: 'noreply@olt.localhost'

admin:
  email: 'admin@olt.localhost'
  contact_form:
    enabled: false

instance:
  name: 'OLT Videos'
  short_description: 'Local OLT video service for development.'
  customizations:
    # Defense-in-depth OLT brand tokens applied at the instance level so the
    # very first paint shows the right cream/navy/turquoise palette even
    # before the peertube-theme-olt plugin CSS finishes loading. The bulk
    # of the re-skin lives in that plugin; this block only pins the few
    # variables that show up in the initial render.
    css: |
      :root {
        --bg: oklch(0.985 0.006 230);
        --fg: oklch(0.32 0.09 255);
        --primary: oklch(0.7 0.1 200);
        --on-primary: oklch(0.32 0.09 255);
        --border-primary: oklch(0.86 0.01 80);
        --menu-bg: #ffffff;
        --menu-fg: oklch(0.32 0.09 255);
        --header-bg: oklch(1 0 0 / 0.85);
      }
      html, body { background: oklch(0.985 0.006 230); color: oklch(0.32 0.09 255); }
    javascript: |
      (function () {
        var path = window.location.pathname;
        var params = new URLSearchParams(window.location.search);
        var authPath = '/plugins/auth-openid-connect/1.1.0/auth/openid-connect';

        if (window.localStorage.getItem('access_token')) return;
        if (params.has('externalAuthToken') || params.has('externalAuthError')) return;
        if (path.indexOf('/plugins/') === 0) return;
        if (window.sessionStorage.getItem('olt-peertube-autologin') === '1') return;

        window.sessionStorage.setItem('olt-peertube-autologin', '1');
        window.location.assign(authPath);
      }());

signup:
  enabled: false

# Activate the OLT brand theme by default for every visitor. The plugin
# itself is installed and enabled by docker/peertube/bootstrap-plugin.sh.
theme:
  default: 'olt'

client:
  menu:
    login:
      redirect_on_single_external_auth: true
